components:
  schemas:
    AnswerChoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        choice_text:
          type: string
          maxLength: 500
        is_correct:
          type: boolean
        order:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
      required:
      - choice_text
      - id
    Badge:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          format: uri
          nullable: true
        badge_type:
          $ref: '#/components/schemas/BadgeTypeEnum'
        condition_type:
          $ref: '#/components/schemas/ConditionTypeEnum'
        condition_value:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        xp_bonus:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        coin_bonus:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        rarity:
          $ref: '#/components/schemas/RarityEnum'
      required:
      - badge_type
      - condition_type
      - description
      - id
      - name
    BadgeTypeEnum:
      enum:
      - streak
      - quiz
      - lesson
      - social
      - special
      type: string
      description: |-
        * `streak` - Streak
        * `quiz` - Test
        * `lesson` - Dars
        * `social` - Ijtimoiy
        * `special` - Maxsus
    Challenge:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        challenger:
          type: string
          format: uuid
        challenger_username:
          type: string
          readOnly: true
        challenger_avatar:
          type: string
          format: uri
          readOnly: true
        challenger_level:
          type: string
          readOnly: true
        opponent:
          type: string
          format: uuid
        opponent_username:
          type: string
          readOnly: true
        opponent_avatar:
          type: string
          format: uri
          readOnly: true
        opponent_level:
          type: string
          readOnly: true
        quiz:
          type: string
          format: uuid
        quiz_title:
          type: string
          readOnly: true
        classroom:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: '#/components/schemas/ChallengeStatusEnum'
        challenger_score:
          type: number
          format: double
          nullable: true
        opponent_score:
          type: number
          format: double
          nullable: true
        winner:
          type: string
          format: uuid
          nullable: true
        xp_stake:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        expires_at:
          type: string
          format: date-time
        expires_in_seconds:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        show_scores:
          type: string
          readOnly: true
      required:
      - challenger
      - challenger_avatar
      - challenger_level
      - challenger_username
      - created_at
      - expires_at
      - expires_in_seconds
      - id
      - opponent
      - opponent_avatar
      - opponent_level
      - opponent_username
      - quiz
      - quiz_title
      - show_scores
    ChallengeStatusEnum:
      enum:
      - pending
      - accepted
      - in_progress
      - completed
      - declined
      - expired
      type: string
      description: |-
        * `pending` - Kutilmoqda
        * `accepted` - Qabul qilingan
        * `in_progress` - Davom etmoqda
        * `completed` - Yakunlangan
        * `declined` - Rad etilgan
        * `expired` - Muddati o'tgan
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    Classroom:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          readOnly: true
        teacher:
          type: string
          format: uuid
          readOnly: true
        teacher_name:
          type: string
          readOnly: true
        subject:
          type: string
          maxLength: 100
        description:
          type: string
        academic_year:
          type: string
          maxLength: 9
        is_active:
          type: boolean
        max_students:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        student_count:
          type: integer
          readOnly: true
        is_joined:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - is_joined
      - name
      - student_count
      - subject
      - teacher
      - teacher_name
      - updated_at
    ClassroomCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        subject:
          type: string
          maxLength: 100
        description:
          type: string
        academic_year:
          type: string
          maxLength: 9
        max_students:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
      required:
      - name
      - subject
    ClassroomUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        subject:
          type: string
          maxLength: 100
        description:
          type: string
        is_active:
          type: boolean
        max_students:
